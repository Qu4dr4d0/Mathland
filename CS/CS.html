<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="shortcut icon" href="../icon.svg" type="image/x-icon">

  <title>Circle sector</title>

  <!--CSS FILES-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
  <link rel="stylesheet" href="CS.css">


  <script src="CS.js"></script>
</head>
<body class="text-center pt-5"> 

  <div class="container-md  text-center" style="max-width: 500px;">
    <div class="card mt-3 shadow">
      <div class="card-header justify-content-between" style="display: flex;">
        <h1 class="h5 text-start text-dark">Circle sector area</h1>
        <button type="button" class="bbtn" data-bs-toggle="modal" data-bs-target="#exampleModal">?</button>
      </div>


      <div class="modal fade text-start" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">How it works?</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <p>To calculate the area of an circle sector, we use the this formula:</p>
              <img class="mb-3" src="../img/f-circlesector.svg" alt="" width="180px">
              <p><b>Legend:</b><br>A = Area<br>π = 3.1415...<br>X = Radius<br>Y = Angle</p>

            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">OK</button>
            </div>
          </div>
        </div>
      </div>
      <div class="card-body text-start">
       
          <p class="mt-1 mb-3">Just enter the base and height of the triangle below and then click "Calculate Area".</p>

          <div class="row text-center">
            <div class="col">
              <p>Radius:<br><input id="radius" class="inputnum" style="width: 150px" type="number" placeholder="A"></p>
            </div>
            <div class="col">
              <p>Angle:<br><input id="angle" class="inputnum" style="width: 150px" type="number" placeholder="B"></p>
            </div>
          </div>

         

          <div class="row text-center">
            <button onclick="calc()" type="button" class="btn btn-primary mb-3 mx-auto" style="width: 120px;">Calculate</button>
            <div class="resultdiv h6">Area: <span id="res"></span></div>
           </div>

      </div>
    </div>
  </div>
  <a href="../index.html" class="btn btn-primary mt-3"><ion-icon name="arrow-undo" style="margin-right: 10px;"></ion-icon>Return to menu</a>




  
  <!--JS FILES-->
  <script src="./js/bootstrap.js"></script>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>

  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

</body>
</html>
