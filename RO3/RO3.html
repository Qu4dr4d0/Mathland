<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rule of three</title>

    <link rel="shortcut icon" href="../icon.svg" type="image/x-icon">
    <link rel="stylesheet" href="RO3.css">

    <script src="RO3.js"></script>

  </head>
  <body class="text-center pt-5">

    <article class="container"  style="max-width: 500px;">
      <div class="card shadow">
        <div class="card-header">
          <h2 class="h4">Rule of 3 simple</h2>
        </div>
        <div class="card-body text-center">

          <p class="text-start">The simple rule of three calculator allows you to find a number in proportion to the other two that are known.</p>


          <div class="row mb-4 mt-4">
            <div class="col">
              <input id="n1" class="inp" type="number" placeholder="A">
            </div>
            <div class="col-1 text-center">
              <ion-icon name="arrow-forward-outline"></ion-icon>
            </div>
            <div class="col">
              <input id="n2" class="inp" type="number" placeholder="B">
            </div>
          </div>

          <div class="row text-center">
            <div class="col">
            <input id="n3" class="inp" type="number" placeholder="C">
            </div>
            <div class="col-1 text-center">
              <ion-icon name="arrow-forward-outline"></ion-icon>
            </div>
            <div class="col">
              <p id="result" class="result">X</p>
            </div>
          </div>
          <button onclick="calc()" type="button" class="btn btn-primary mt-3">Calculate</button>
        </div>
      </div>
    </article>
    <a href="../index.html" class="btn btn-primary mt-3"><ion-icon name="arrow-undo" style="margin-right: 10px;"></ion-icon>Return to menu</a>
    
  




    <!--ICONS-->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

    <!--BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">


    <!--SWEET ALERTS-->
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    
  </body>
</html>
