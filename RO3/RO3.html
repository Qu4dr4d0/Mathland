<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rule of three</title>

    <link rel="shortcut icon" href="../icon.svg" type="image/x-icon">
    <link rel="stylesheet" href="RO3.css">

    <script src="RO3.js"></script>

  </head>
  <body class="text-center pt-5">

    <article class="container"  style="max-width: 500px;">
      <div class="card shadow">
        <div class="card-header justify-content-between" style="display: flex;">
          <h2 class="h5">Rule of 3 simple</h2>
          <button type="button" class="bbtn" data-bs-toggle="modal" data-bs-target="#exampleModal">?</button>
        </div>
  
  
        <div class="modal fade text-start" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">How it works?</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <p>To calculate the area of an triangle, we use the this formula:</p>
                <img class="mb-3" src="../img/triangle-formula.png" alt="" width="120px">
                <p><b>Legend</b><br>A = Area<br>b = Base<br>h = height</p>
  
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">OK</button>
              </div>
            </div>
          </div>
        </div>
        <div class="card-body text-center">

          <p class="text-start">The simple rule of three calculator allows you to find a number in proportion to the other two that are known.</p>


          <div class="row mb-4 mt-4">
            <div class="col">
              <input id="n1" class="inp" type="number" placeholder="A">
            </div>
            <div class="col-1 text-center">
              <ion-icon name="arrow-forward-outline"></ion-icon>
            </div>
            <div class="col">
              <input id="n2" class="inp" type="number" placeholder="B">
            </div>
          </div>

          <div class="row text-center">
            <div class="col">
            <input id="n3" class="inp" type="number" placeholder="C">
            </div>
            <div class="col-1 text-center">
              <ion-icon name="arrow-forward-outline"></ion-icon>
            </div>
            <div class="col">
              <p id="result" class="result">X</p>
            </div>
          </div>
          <button onclick="calc()" type="button" class="btn btn-primary mt-3">Calculate</button>
        </div>
      </div>
    </article>
    <a href="../calculators/calculators.html" class="btn btn-primary mt-3"><ion-icon name="arrow-undo" style="margin-right: 10px;"></ion-icon>Return to menu</a>
